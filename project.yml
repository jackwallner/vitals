name: Vitals
options:
  bundleIdPrefix: com.jackwallner
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Vitals:
    type: application
    platform: iOS
    sources:
      - path: Vitals
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.vitals
        INFOPLIST_FILE: Vitals/Info.plist
        CODE_SIGN_ENTITLEMENTS: Vitals/Vitals.entitlements
    dependencies:
      - target: VitalsWidget
      - target: VitalsWatch

  VitalsWatch:
    type: application
    platform: watchOS
    sources:
      - path: VitalsWatch
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.vitals.watchapp
        INFOPLIST_FILE: VitalsWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: VitalsWatch/VitalsWatch.entitlements
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
    dependencies:
      - target: VitalsWatchWidget

  VitalsWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: VitalsWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.vitals.widget
        INFOPLIST_FILE: VitalsWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: VitalsWidget/VitalsWidget.entitlements
  VitalsWatchWidget:
    type: app-extension
    platform: watchOS
    sources:
      - path: VitalsWatchWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.vitals.watchapp.complication
        INFOPLIST_FILE: VitalsWatchWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: VitalsWatchWidget/VitalsWatchWidget.entitlements
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
