name: No AI Co-Authors

on:
  push:
  pull_request:

jobs:
  check-commit-messages:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine commit range
        id: range
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "value=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            echo "value=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.before }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Reject AI co-author trailers
        shell: bash
        run: |
          range="${{ steps.range.outputs.value }}"

          if git log --format='%H%n%B%n---' "$range" | rg -n -i '^co-authored-by: .*(claude|anthropic|chatgpt|openai|copilot|gemini|cursor|gpt|ai assistant)'; then
            echo "AI co-author trailer detected in commit messages."
            exit 1
          fi
